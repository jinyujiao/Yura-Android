name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: "21"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Validate tag and version
        shell: bash
        run: |
          set -euo pipefail
          source version.properties
          expected_tag="v${VERSION_NAME}"
          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION_NAME ${VERSION_NAME}."
            exit 1
          fi
          if ! [[ "${VERSION_CODE}" =~ ^[1-9][0-9]*$ ]]; then
            echo "VERSION_CODE must be a positive integer."
            exit 1
          fi

      - name: Configure release keystore
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_KEYSTORE_BASE64:-}" ]]; then
            echo "Missing release Environment secret: RELEASE_KEYSTORE_BASE64"
            exit 1
          fi
          keystore_path="${RUNNER_TEMP}/yura-release.jks"
          printf '%s' "${RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${keystore_path}"

      - name: Grant Gradle wrapper permission
        run: chmod +x gradlew

      - name: Test, lint, and build release
        env:
          ORG_GRADLE_PROJECT_RELEASE_STORE_FILE: ${{ runner.temp }}/yura-release.jks
          ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          ORG_GRADLE_PROJECT_RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: >
          ./gradlew
          :app:testDebugUnitTest
          :app:compileDebugAndroidTestKotlin
          :app:lintDebug
          :app:assembleRelease
          :app:bundleRelease
          --no-daemon
          --no-configuration-cache
          --stacktrace

      - name: Verify and package artifacts
        shell: bash
        run: |
          set -euo pipefail
          source version.properties
          apk="app/build/outputs/apk/release/app-release.apk"
          aab="app/build/outputs/bundle/release/app-release.aab"
          apksigner="$(find "${ANDROID_HOME}/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          if [[ -z "${apksigner}" ]]; then
            echo "apksigner was not found."
            exit 1
          fi
          "${apksigner}" verify --verbose --print-certs "${apk}"
          mkdir -p dist
          cp "${apk}" "dist/Yura-${VERSION_NAME}.apk"
          cp "${aab}" "dist/Yura-${VERSION_NAME}.aab"
          (
            cd dist
            sha256sum "Yura-${VERSION_NAME}.apk" "Yura-${VERSION_NAME}.aab" > SHA256SUMS.txt
          )

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yura-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source version.properties
          gh release create "${GITHUB_REF_NAME}" dist/* --verify-tag --title "Yura ${VERSION_NAME}" --generate-notes
